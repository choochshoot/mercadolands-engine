<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">

  <title>MercadoLands Admin</title>

  <link rel="stylesheet" href="./admin.css">
</head>
<body>
  <main id="admin-lock" class="lock-shell">
    <section class="lock-card">
      <span>MercadoLands Engine</span>
      <h1>Acceso admin</h1>
      <form id="lock-form">
        <label for="admin-key">Clave temporal</label>
        <input id="admin-key" type="password" autocomplete="current-password" placeholder="Ingresa la clave">
        <button type="submit">Entrar</button>
        <p id="lock-error" role="status"></p>
      </form>
    </section>
  </main>

  <main class="admin-shell">
    <section class="admin-panel">
      <header class="admin-header">
        <div>
          <span>MercadoLands Engine</span>
          <h1>Landing Builder</h1>
        </div>
        <div class="admin-links">
          <a id="view-link" class="ghost-link" href="./u/index.html?slug=daniela" target="_blank" rel="noopener noreferrer">
            Ver landing
          </a>
          <a id="share-link" class="ghost-link" href="./share/daniela.html" target="_blank" rel="noopener noreferrer">
            Compartir
          </a>
        </div>
      </header>

      <section class="builder-grid">
        <form id="builder-form" class="builder-form">
          <div class="field-row">
            <label for="slug">Slug</label>
            <input id="slug" name="slug" type="text" placeholder="ejemplo: casanorte" value="casanorte">
          </div>

          <div class="split-fields">
            <div class="field-row">
              <label for="template">Template</label>
              <select id="template" name="template"></select>
            </div>

            <div class="field-row">
              <label for="theme">Theme</label>
              <select id="theme" name="theme"></select>
            </div>
          </div>

          <div id="dynamic-fields" class="dynamic-fields"></div>

          <div class="actions-row">
            <button type="button" id="load-btn" class="secondary-btn">Cargar slug</button>
            <button type="submit" id="save-btn">Guardar landing</button>
          </div>

          <div id="admin-status" class="admin-status" role="status"></div>
        </form>

        <aside class="preview-panel">
          <div class="preview-header">
            <span>JSON generado</span>
            <button type="button" id="copy-json" class="icon-btn">Copiar</button>
          </div>
          <pre id="json-preview"></pre>
        </aside>
      </section>
    </section>
  </main>

  <script type="module" src="./admin/lock.js?v=20260702-vanessa-assets-v5"></script>
</body>
</html>
