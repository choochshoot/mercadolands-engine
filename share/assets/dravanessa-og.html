<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=1200, initial-scale=1.0">
  <title>Dra. Vanessa Gonzalez OG</title>
  <style>
    * { box-sizing: border-box; }
    body {
      width: 1200px;
      height: 630px;
      margin: 0;
      overflow: hidden;
      background: #1A1A1D;
      color: #fff;
      font-family: Arial, sans-serif;
    }
    .card {
      width: 1200px;
      height: 630px;
      position: relative;
      padding: 64px 72px;
      background:
        radial-gradient(circle at 78% 6%, rgba(106, 30, 85, 0.42), transparent 34%),
        radial-gradient(circle at 94% 72%, rgba(166, 77, 121, 0.24), transparent 30%),
        linear-gradient(90deg, #1A1A1D 0%, #261724 54%, #3B1C32 100%);
    }
    .panel {
      width: 1056px;
      height: 502px;
      border: 2px solid rgba(166, 77, 121, 0.6);
      border-radius: 34px;
      padding: 60px 40px;
      background: linear-gradient(108deg, rgba(18, 18, 22, 0.94), rgba(59, 28, 50, 0.88));
      position: relative;
    }
    .accent { width: 180px; height: 4px; border-radius: 99px; background: linear-gradient(90deg, #A64D79, #f4b6dc); margin-bottom: 22px; }
    .brand { font: 700 25px Georgia, serif; }
    .sub { margin-top: 5px; color: #d8b88e; font-size: 12px; font-weight: 800; letter-spacing: 1.7px; }
    .eyebrow { margin-top: 38px; color: #f0a9d0; font-size: 18px; font-weight: 900; letter-spacing: 2.4px; text-transform: uppercase; }
    h1 { margin: 16px 0 0; width: 620px; font: 700 64px/0.96 Georgia, serif; letter-spacing: 0; }
    p { width: 600px; margin: 22px 0 0; color: rgba(238, 221, 234, 0.9); font-size: 25px; line-height: 1.28; }
    .cta { display: inline-flex; align-items: center; height: 42px; margin-top: 18px; padding: 0 20px; border-radius: 10px; background: linear-gradient(90deg, #6A1E55, #A64D79); font-weight: 800; font-size: 20px; }
    .mark { position: absolute; right: 60px; top: 48px; width: 282px; height: 282px; border-radius: 50%; border: 3px solid rgba(166, 77, 121, 0.52); display: grid; place-items: center; background: linear-gradient(135deg, #050608, #1A1A1D); font: 700 100px Georgia, serif; }
    .chips { position: absolute; right: 54px; bottom: 68px; display: flex; gap: 10px; }
    .chip { border: 1px solid rgba(166, 77, 121, 0.36); border-radius: 12px; padding: 10px 17px; color: #f7d6ea; background: rgba(255, 255, 255, 0.08); font-weight: 800; font-size: 17px; }
  </style>
</head>
<body>
  <main class="card">
    <section class="panel">
      <div class="accent"></div>
      <div class="brand">VANESSA GONZALEZ</div>
      <div class="sub">STUDIO DERMA BOUTIQUE</div>
      <div class="eyebrow">Luxury treatments</div>
      <h1>Dra. Vanessa Gonzalez</h1>
      <p>Dermatologia estetica de alta gama. Catalogo claro para elegir servicio y agendar por WhatsApp.</p>
      <div class="cta">Agendar valoracion privada</div>
      <div class="mark">VG</div>
      <div class="chips"><span class="chip">Belleza</span><span class="chip">Ciudad</span><span class="chip">Dermatologia</span></div>
    </section>
  </main>
</body>
</html>
